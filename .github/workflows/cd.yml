name: Manufacturing CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    name: "📦 Build & Package"
    runs-on: ubuntu-latest

    outputs:
      build_sha: ${{ steps.set_sha.outputs.build_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set SHA output
        id: set_sha
        run: echo "build_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Create dist folder
        run: |
          mkdir -p dist
          cp manufacturing_calc.py dist/
          cp smoke_test.py dist/

      - name: Create build manifest
        run: |
          cat > dist/build_info.json << EOF
          {
            "project": "AI-Enhanced CI/CD for Manufacturing Software",
            "version": "1.0.${{ github.run_number }}",
            "commit": "${GITHUB_SHA::8}",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-build-${{ steps.set_sha.outputs.build_sha }}
          path: dist/
          retention-days: 7

  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: manufacturing-build-${{ needs.build.outputs.build_sha }}
          path: dist/

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run smoke test
        run: python smoke_test.py

      - name: Staging success
        run: echo "✅ Staging deployment SUCCESSFUL"

  deploy-production:
    name: "🏭 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [ build, deploy-staging ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: manufacturing-build-${{ needs.build.outputs.build_sha }}
          path: dist/

      - name: Pre-production health check
        run: |
          python -c "
          from manufacturing_calc import calculate_oee, calculate_cycle_time
          assert calculate_oee(1.0, 1.0, 1.0) == 1.0
          assert calculate_cycle_time(3600, 100) == 36.0
          print('✅ Health checks passed')
          "

      - name: Run smoke test
        run: python smoke_test.py

      - name: Production success
        run: echo "🏭 Production deployment SUCCESSFUL"

  notify:
    name: "🔔 Notify"
    runs-on: ubuntu-latest
    needs: [ deploy-staging, deploy-production ]
    if: always()

    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "✅ ALL STAGES PASSED — Deployment Complete"
          else
            echo "❌ DEPLOYMENT FAILED"
            exit 1
          fi