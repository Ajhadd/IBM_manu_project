name: Manufacturing CD Pipeline

on:
  push:
    branches: [ main ]        # Only deploy from main branch
  workflow_run:
    workflows: ["Manufacturing CI Pipeline"]
    types: [ completed ]      # Only run after CI passes

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Build & Package the application
  # ---------------------------------------------------------------------------
  build:
    name: "📦 Build & Package"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Create package structure
        run: |
          mkdir -p dist
          cp manufacturing_calc.py dist/
          cp smoke_test.py dist/

      - name: Generate build info
        run: |
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "BUILD_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Create build manifest
        run: |
          cat > dist/build_info.json << EOF
          {
            "project": "AI-Enhanced CI/CD for Manufacturing Software",
            "version": "1.0.${{ github.run_number }}",
            "build_date": "${{ env.BUILD_DATE }}",
            "commit_sha": "${{ env.BUILD_SHA }}",
            "branch": "${{ github.ref_name }}",
            "python_version": "3.11"
          }
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: manufacturing-build-${{ env.BUILD_SHA }}
          path: dist/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Staging environment
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging.manufacturing-app.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: manufacturing-build-${{ env.BUILD_SHA }}
          path: dist/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Simulate staging deployment
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploying to STAGING environment..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Run #   : ${{ github.run_number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run smoke test on staging
        run: python smoke_test.py

      - name: Run staging validation tests
        run: |
          pytest tests/ \
            --verbose \
            --tb=short \
            -k "not slow"

      - name: Staging deployment success
        run: |
          echo "✅ Staging deployment SUCCESSFUL"
          echo "🌐 Available at: https://staging.manufacturing-app.example.com"

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Production (requires manual approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: "🏭 Deploy to Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://manufacturing-app.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: manufacturing-build-${{ env.BUILD_SHA }}
          path: dist/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Pre-production health check
        run: |
          echo "🔍 Running pre-production health check..."
          python -c "
          from manufacturing_calc import (
              calculate_oee,
              calculate_cycle_time,
              calculate_defect_rate,
              calculate_throughput,
              estimate_production_cost
          )
          assert calculate_oee(1.0, 1.0, 1.0) == 1.0
          assert calculate_cycle_time(3600, 100) == 36.0
          assert calculate_defect_rate(0, 100) == 0.0
          assert calculate_throughput(480, 8) == 60.0
          print('✅ All health checks passed')
          "

      - name: Deploy to production
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Deploying to PRODUCTION environment..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Run #   : ${{ github.run_number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Run final smoke test
        run: python smoke_test.py

      - name: Production deployment success
        run: |
          echo "🏭 Production deployment SUCCESSFUL"
          echo "🌐 Live at: https://manufacturing-app.example.com"

  # ---------------------------------------------------------------------------
  # Job 4: Post-deployment notification
  # ---------------------------------------------------------------------------
  notify:
    name: "🔔 Deployment Notification"
    runs-on: ubuntu-latest
    needs: [ deploy-staging, deploy-production ]
    if: always()

    steps:
      - name: Notify deployment result
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ✅ DEPLOYMENT COMPLETE — All stages passed"
            echo "  📦 Build    : SUCCESS"
            echo "  🚀 Staging  : SUCCESS"
            echo "  🏭 Production: SUCCESS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          else
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  ❌ DEPLOYMENT FAILED — Check logs above"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi